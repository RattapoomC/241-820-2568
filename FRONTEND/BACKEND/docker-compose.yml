version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: webdb_mysql
    command: --default-authentication-plugin=mysql_native_password

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webdb

    ports:
      - "8821:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - weblab

    restart: always


  phpmyadmin:
    image: phpmyadmin:latest
    container_name: webdb_phpmyadmin

    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

    ports:
      - "8822:80"

    depends_on:
      - db

    networks:
      - weblab

    restart: always


networks:
  weblab:
    driver: bridge


volumes:
  mysql_data:
    driver: local