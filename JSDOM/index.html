<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>JSDOMMMMMMM</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit" rel="stylesheet">
    <style>
        body {
          font-family: 'Kanit', sans-serif;   /*ใช้ฟอนต์ จากพิกัดUrlบน ^^^ */
        }
    </style>

</head>

<body>

    ชื่อ :
    <input 
        id="fullname"          
        type="text"
        name="fullname"
        value="John">

    นามสกุล :
    <input
        id="lastname"          
        type="text"
        name="lastname"
        value="Doe">
    <br><br>

    งานอดิเรก :
    <input type="checkbox" name="hobby" value="football"> Football
    <input type="checkbox" name="hobby" value="basketball"> Basketball
    <input type="checkbox" name="hobby" value="tennis"> Tennis  
    <pre></pre> 

    <button onclick="handleSubmit()">Submit</button>
    <br><br>

    เพศ :
    <input type="radio" name="gender" value="male" onchange="handleGenderChange()" checked> ชาย
    <input type="radio" name="gender" value="female" onchange="handleGenderChange()"> หญิง

    <script>
        
        function handleGenderChange() {

            let genderInputs = document.querySelectorAll("input[name='gender']");
            for (let i = 0; i < genderInputs.length; i++) {
                if (genderInputs[i].checked) {
                    console.log("เพศที่เลือก: " + genderInputs[i].value);
                }
            }
        }

        function handleSubmit() {
            console.log("User clicked the button!");

            logHobbies();
        }

        function logHobbies() {

            let hobbyCheckboxes = document.querySelectorAll("input[name='hobby']");

            for (let i = 0; i < hobbyCheckboxes.length; i++) {
                if (hobbyCheckboxes[i].checked) {
                    console.log("งานอดิเรก : " + hobbyCheckboxes[i].value);
                }
            }
        }

        const firstNameInput = document.getElementById("fullname");
        console.log("ชื่อ:", firstNameInput.value);

        const lastNameInput = document.getElementById("lastname");
        console.log("นามสกุล:", lastNameInput.value);

    </script>

</body>
</html>
